name: Windows Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  Configuration: Release

jobs:
  test:
    name: Test All Targets
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '11.0.x'
        source-url: https://nuget.pkg.github.com/TSSArt/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.XTATE_GITHUB_TOKEN }}
    - name: Test
      run: dotnet test test/Xtate.Core.Test/Xtate.Core.Test.csproj --configuration ${{ env.Configuration }}
